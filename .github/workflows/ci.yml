name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ============================================
  # Guard: Dead Reference Check (Directive #315)
  # ============================================
  dead-reference-guard:
    name: Dead Reference Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for dead references (crm_sync_flow)
        run: |
          if grep -rn "crm_sync_flow" src/ --include="*.py" | grep -v __pycache__ | grep -v "# PERMANENTLY REMOVED" | grep -v "# DEAD:"; then
            echo "ERROR: Dead reference to crm_sync_flow found. Permanently removed in Directive #315. Do NOT recreate — build a new HubSpot-specific flow instead."
            exit 1
          fi
          echo "OK: crm_sync_flow not present."

  # ============================================
  # Guard: Migration Completeness (Wave 1 Item 4, audit Pattern A)
  # ============================================
  # Fails when a PR removes a writer (INSERT INTO X / UPDATE X) but leaves
  # readers of X in src/scripts/skills. Closes the "unclosed migration paths"
  # pattern surfaced by the 2026-05-12 memory audit
  # (docs/audits/memory_audit_2026-05-12.md).
  migration-completeness:
    name: Migration Completeness Guard
    runs-on: ubuntu-latest
    # Runs on PRs AND on push-to-main. The push-to-main run is the
    # recurrence guard: it catches a Pattern A regression that lands via a
    # merge whose PR-time diff did not surface it (e.g. squash-merge skew).
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Detect removed write targets in diff
        id: detect
        run: |
          # Resolve the diff range for BOTH event types. On a PR we diff
          # against the base branch; on a push-to-main we diff the pushed
          # commit range (github.event.before...HEAD), falling back to
          # HEAD~1 when `before` is unset/all-zero (first push, force-push).
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.ref }}"
            git fetch origin "$BASE_REF" --depth=50
            DIFF_RANGE="origin/$BASE_REF...HEAD"
          else
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              DIFF_RANGE="HEAD~1...HEAD"
            else
              git fetch origin "$BEFORE" --depth=50 || true
              DIFF_RANGE="$BEFORE...HEAD"
            fi
          fi
          echo "Diff range: $DIFF_RANGE"
          # Removed INSERT INTO <X> / UPDATE <X> lines in src/scripts/skills.
          # Extract <X> (table identifier, may contain dots for schema-qualified).
          # KEI-47: filter SQL reserved keywords from the capture set.
          # Prose like "[UPDATE FROM {callsign}]" was tripping the regex with
          # FROM captured as the supposed table name. The Python checker has a
          # defense-in-depth skip for the same set; this upstream filter
          # prevents the noise from reaching the checker at all.
          # KEI-100: also compute ADDED writers and net them out. Pattern A is
          # "writer removed, readers kept" — a replacement (writer moved to a
          # different file/function in the same diff) is NOT the audit
          # concern, but the removed-only extractor flagged it as such. Net
          # set = removed minus added; replacement targets drop out.
          RESERVED='FROM|WHERE|SET|JOIN|ON|AS|AND|OR|NOT|NULL|TRUE|FALSE|INTO|VALUES|GROUP|ORDER|BY|HAVING|LIMIT|OFFSET|RETURNING|WITH|UNION|ALL|DISTINCT|EXISTS|IN|BETWEEN|LIKE|IS|CASE|WHEN|THEN|ELSE|END'
          extract_targets() {
            local line_prefix="$1"
            git diff "$DIFF_RANGE" -- src/ scripts/ skills/ \
              | grep -E "^${line_prefix}[^${line_prefix}]" \
              | grep -oE '(INSERT[[:space:]]+INTO|UPDATE)[[:space:]]+[a-zA-Z_][a-zA-Z0-9_.]*' \
              | awk '{print $NF}' \
              | grep -ivxE "$RESERVED" \
              | sort -u
          }
          REMOVED=$(extract_targets '-' || true)
          ADDED=$(extract_targets '\+' || true)
          # comm -23 = lines in first file not in second = removed minus added.
          TARGETS=$(comm -23 <(echo "$REMOVED") <(echo "$ADDED") || true)
          if [ -z "$TARGETS" ]; then
            echo "No removed write targets detected — Pattern A check skipped."
          else
            echo "Detected removed write targets:"
            echo "$TARGETS"
          fi
          {
            echo "targets<<EOF"
            echo "$TARGETS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Check each removed target for residual readers
        run: |
          TARGETS="${{ steps.detect.outputs.targets }}"
          if [ -z "$TARGETS" ]; then
            echo "Pattern A check: nothing to verify."
            exit 0
          fi
          FAIL=0
          while IFS= read -r target; do
            [ -z "$target" ] && continue
            echo "::group::Checking $target"
            if ! python3 scripts/check_migration_completeness.py --removed-target "$target"; then
              FAIL=1
            fi
            echo "::endgroup::"
          done <<< "$TARGETS"
          if [ "$FAIL" -ne 0 ]; then
            echo "::error::Pattern A violation — see audit memory_audit_2026-05-12.md"
            exit 1
          fi
          echo "All removed targets have no residual readers."

  # ============================================
  # Backend: Lint, Type Check, Test
  # ============================================
  backend-lint:
    name: Backend Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check src/ --output-format=github

      - name: Run ruff formatter check
        run: ruff format src/ --check

  # ============================================
  # Guard: boundary-matrix-v1 (directive #10028)
  # ============================================
  # Source: ceo:boundary_matrix_v1 (RATIFIED-CEO 2026-05-26, CONCUR-Full
  # Aiden + Max + Viktor). Full text at docs/governance/boundary_matrix_v1.md.
  # Four guards run as separate steps so the failing one is obvious in CI log;
  # set -e + non-zero exit on any guard fails the job.
  boundary-matrix-guards:
    name: Boundary Matrix v1 Guards
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4

      - name: (a) NATS forbidden in Temporal workflow files
        run: ./scripts/ci/check_no_nats_in_temporal_workflow_files.sh

      - name: (b) Direct DB drivers forbidden outside MAL + control_plane
        run: ./scripts/ci/check_no_direct_db_outside_mal.sh

      - name: (c) Composio imports forbidden outside MCP layer
        run: ./scripts/ci/check_no_direct_composio_outside_mcp.sh

      - name: (d) Governance policy (ceo:*) forbidden in Hindsight wrappers
        run: ./scripts/ci/check_no_governance_policy_in_hindsight.sh

  # ============================================
  # Guard: Phase A7 cache discipline (CB-10)
  # ============================================
  # Source: docs/architecture/design/a7_cache_architecture.md §13 CB-10.
  # All Valkey key construction MUST go through ValkeyClient.canonical_cache_key().
  # Complements src/keiracom_system/cache/valkey_client.py runtime guard
  # (defence-in-depth: linter at PR-review time + runtime guard at request time).
  cache-discipline-guards:
    name: Cache Discipline Guards (A7 CB-10)
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4

      - name: No raw redis/valkey calls outside ValkeyClient
        run: ./scripts/ci/check_no_raw_valkey_outside_client.sh

  # ============================================
  # Guard: Cache write TTL 5-minute default (Cat 21 lever 29)
  # ============================================
  # Cutover Readiness Gate INFRASTRUCTURE-SIDE — "cache write TTL 5-minute"
  # (RATIFIED-CEO Cat 21 lever 29, Dave directive 2026-05-27).
  # Anthropic cache_write_1h ~$30/M (Opus 4.x) vs cache_write_5m ~$18.75/M →
  # 37% delta on cache-write cost line per Atlas empirical 2026-05-27.
  # Complements tests/keiracom_system/cache/test_litellm_helpers.py
  # ::test_ephemeral_cache_control_is_5min_default_no_ttl_key (type-level
  # lock on the canonical default constant) with cross-codebase enforcement
  # on ad-hoc cache_control dicts.
  cache-write-ttl-5min-guard:
    name: Cache Write TTL 5-Min Default Guard (Cat 21 lever 29)
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4

      - name: No 1h cache_control ttl literals in src/ or scripts/
        run: ./scripts/ci/check_no_1h_cache_ttl.sh

  # ============================================
  # Guard: Atomization pilot atom-store discipline
  # ============================================
  # Source: docs/architecture/design/atomization_pilot_schema_lock_proposal.md §6
  # (PR #1178 merged 2026-05-26). All keiracom_atoms / supersession_edges /
  # atomizer_jobs access MUST go through AtomStore (tenant-prefix guard +
  # frozen vocabulary checks). Complements the AtomStore._enforce_tenant_match
  # runtime guard (defence-in-depth pattern; mirrors A7 CB-10 + BMV1 guard b).
  atom-store-discipline-guards:
    name: Atom Store Discipline Guards (Atomization Pilot)
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4

      - name: No raw atom-store SQL outside atomization module
        run: ./scripts/ci/check_no_raw_atom_store_outside_module.sh

  # ============================================
  # Gate: Atom Granularity (Wave 1 CUTOVER GATE, Agency_OS-3g9t)
  # ============================================
  # Source: docs/architecture/atom_granularity_spec.md (Dave + Aiden + Viktor
  # ratify 2026-05-27). Validates atom-shaped JSON/JSONL fixtures against the
  # granularity spec (size bounds + single-concept heuristic + source-pointer).
  # Runtime-enforced per GOV-12 (gate-as-code, not a comment). No-op exit 0
  # until atom-shaped fixtures land; exit 1 on any violating atom.
  atom-granularity-gate:
    name: Atom Granularity Gate (Cutover)
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Validate committed atoms against the granularity spec
        run: python3 scripts/ci/check_atom_granularity.py --report

  # ============================================
  # Guard: Composer-output isolation (atomization hard constraint)
  # ============================================
  # Source: ceo:atomization_architecture_v1 hard constraint #1 — "Composer
  # output never reaches agent reasoning input." Preemptive guard; inert
  # until PR #1189 lands Composer module. Mirrors the import-scope detection
  # pattern from BMV1 guards + cache-discipline + atom-store-discipline.
  composer-isolation-guards:
    name: Composer Isolation Guards (Atomization Pilot)
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4

      - name: No Composer imports outside endpoints/
        run: ./scripts/ci/check_composer_output_never_reaches_agent_reasoning.sh

  # ============================================
  # Gate: Adversarial Retrieval Probe (Wave 6)
  # ============================================
  # Continuous adversarial probe of the memory layer: asks known questions and
  # verifies the relevant memories surface (and that superseded / cross-tenant
  # content does NOT). Non-blocking (warning) initially — the runner self-skips
  # when HINDSIGHT_URL is unset (hermetic CI has no live Hindsight) and warns
  # without failing the build below the precision threshold. Upgrades to a hard
  # gate at cutover by setting RETRIEVAL_PROBE_BLOCKING=1 (GOV-12: the toggle is
  # one env var, the gate is code not a comment).
  retrieval-adversarial-probe:
    name: Adversarial Retrieval Probe (non-blocking until cutover)
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run adversarial retrieval probe
        run: python3 scripts/ci/check_retrieval_probe.py --report

  backend-typecheck:
    name: Backend Type Check (MyPy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        # pip >=26.0 enforces a maximum dependency resolution depth that
        # rejects this repo's requirements.txt + extras (resolution-too-deep);
        # the prior `pip<26` pin worked but took >10 min to resolve. Switched
        # to `uv pip install` which uses a much faster resolver — same install
        # completes in seconds. Tech debt: add lower-bound pins in
        # requirements.txt for future-proofing, then drop the uv shim if pip
        # 26+ becomes viable.
        run: |
          pip install uv
          uv pip install --system -r requirements.txt mypy types-redis

      - name: Run mypy
        # Debt: Agency_OS-9hj5 — 1282 pre-existing type errors across 142 files
        # surfaced when KEI-222 removed the original blanket || true mask.
        # Re-mask the mypy gate until the backlog clears — but tracked by a
        # P2 KEI rather than the previous untracked "initially" comment.
        run: mypy src/ --ignore-missing-imports --no-error-summary || true

  backend-test:
    name: Backend Tests (Pytest)
    runs-on: ubuntu-latest
    env:
      ENV: test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_KEY: test-key
      SUPABASE_SERVICE_KEY: test-service-key
      ANTHROPIC_API_KEY: test-key
      APOLLO_API_KEY: test-key
      RESEND_API_KEY: test-key

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        # See mypy job above — uv pip's faster resolver handles the
        # requirements.txt + extras combination that pip 26.0 rejects and
        # pip 25.x took >10 min on.
        run: |
          pip install uv
          uv pip install --system -r requirements.txt pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

  # ============================================
  # ROADMAP V2 status auto-render (Dave directive 2026-05-31)
  # ============================================
  # Renders the current STATUS block from public.gate_roadmap into
  # docs/ROADMAP_V2.md on push to main and opens an auto-PR with the change.
  # Runs regardless of backend-test outcome (if: always()) — the renderer
  # itself never breaks CI; it emits a STATUS_BLOCK_UNAVAILABLE stub on any
  # DB / connectivity failure and exits 0.
  #
  # Why a PR rather than a direct push: main is a protected branch and
  # GitHub Actions' default GITHUB_TOKEN cannot bypass branch protection
  # ("Changes must be made through a pull request"). The job previously
  # tried `git push` and went red every run. The peter-evans action
  # reuses the same auto-update branch each run, so the PR queue stays
  # at exactly one open auto-render PR rather than accumulating one per
  # push.
  roadmap-status-render:
    name: Roadmap Status Render
    needs: backend-test
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install psycopg
        run: pip install "psycopg[binary]"

      - name: Render STATUS block into docs/ROADMAP_V2.md
        env:
          SUPABASE_DB_DSN: ${{ secrets.SUPABASE_DB_DSN }}
        run: python3 scripts/roadmap_status.py --write

      - name: Open or update auto-render PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: roadmap-status-auto-update
          base: main
          commit-message: "chore(roadmap): auto-update STATUS block"
          title: "[BOT] chore(roadmap): auto-update STATUS block"
          body: |
            Auto-generated by the `Roadmap Status Render` CI job.

            Rewrites the `STATUS_BLOCK` in `docs/ROADMAP_V2.md` against the
            current state of `public.gate_roadmap`. Reuses the same branch
            (`roadmap-status-auto-update`) on every push so the PR queue
            stays at exactly one open auto-render PR — merging this one
            absorbs the latest snapshot; the next push that changes state
            will re-open it.
          author: "Roadmap Status Bot <roadmap-bot@keiracom.local>"
          committer: "Roadmap Status Bot <roadmap-bot@keiracom.local>"
          add-paths: docs/ROADMAP_V2.md
          delete-branch: false

  # ============================================
  # Frontend: Lint, Type Check, Build
  # ============================================
  frontend-check:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        # Debt: Agency_OS-awth — frontend has no ESLint config committed; with
        # a minimal next/core-web-vitals config, 79 lint errors surface from
        # pre-existing code. Re-mask the gate behind a tracked KEI rather
        # than leaving it silent.
        run: pnpm lint || true

      - name: Run TypeScript check
        # Frontend type-check is HONEST: tsc --noEmit exits 0 on current main.
        # No mask needed here — KEI-222 removed the original blanket || true.
        run: pnpm type-check

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key
          NEXT_PUBLIC_API_URL: https://test-api.railway.app

  # ============================================
  # Deploy to Railway (only on main)
  # ============================================
  deploy-backend:
    name: Deploy Backend to Railway
    needs: [dead-reference-guard, backend-lint, backend-test, frontend-check]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service agency-os --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ============================================
  # Notify on failure
  # ============================================
  notify-failure:
    name: Notify on Failure
    needs: [dead-reference-guard, backend-lint, backend-typecheck, backend-test, frontend-check]
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Send failure notification
        run: |
          echo "CI Pipeline failed! Check GitHub Actions for details."
          # Add Slack/Discord webhook here if needed
