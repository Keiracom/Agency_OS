name: Governance Equality Guard

# KEI-12 / Item #1 (Scout's MEDIUM recommendation #5).
# Fails CI when CLAUDE.md (kept in-repo for git-history reasons) drifts from
# origin/main. The symlink approach was rejected for CLAUDE.md specifically
# because branch-X-has-its-own-CLAUDE.md is the natural source-control model;
# instead we keep duplicated copies + this guard enforces equality on PR.
#
# Pattern source: scripts/check_migration_completeness.py (Wave 1 Item 4) —
# CI-gate-as-code rather than docs-only convention.

on:
  pull_request:
    branches: [main]
    paths:
      - CLAUDE.md

jobs:
  governance-equality:
    name: CLAUDE.md Equality Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compare CLAUDE.md md5 against origin/main
        run: |
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          git fetch origin "$BASE_REF" --depth=1
          main_hash=$(git show "origin/$BASE_REF":CLAUDE.md | md5sum | awk '{print $1}')
          head_hash=$(md5sum CLAUDE.md | awk '{print $1}')

          if [ "$main_hash" = "$head_hash" ]; then
            echo "CLAUDE.md hash matches origin/$BASE_REF — equality preserved."
            exit 0
          fi

          # Hash diverged — check for authorised exemption (S7630-safe: diff-derived, not PR metadata).
          #
          # Exemption: PR adds at least one new @.claude/modules/_*.md include line.
          #   Rationale: pairing a CLAUDE.md edit with a new module include is the
          #   natural governance-extension pattern; it inspects the actual diff, not
          #   attacker-controlled PR title or commit message text.
          #
          # PR-title and commit-message exemptions removed — S7630 (attacker-controlled inputs).
          diff_added_modules=$(git diff "origin/${BASE_REF}...HEAD" -- CLAUDE.md \
            | grep -cE '^\+@\.claude/modules/_[a-z_]+\.md$' || true)
          if [ "${diff_added_modules}" -gt 0 ]; then
            echo "::notice::CLAUDE.md hash diverged but exemption applied — paired with ${diff_added_modules} new @.claude/modules/ include(s)."
            exit 0
          fi

          # No exemption matched — fail.
          echo "::error::CLAUDE.md hash diverged from origin/${BASE_REF} without exemption"
          echo "  main:  ${main_hash}"
          echo "  HEAD:  ${head_hash}"
          echo ""
          echo "To change CLAUDE.md: pair the edit with a new @.claude/modules/_*.md include line."
          echo "PR-title and commit-message exemptions removed (S7630 — attacker-controlled inputs)."
          exit 1
