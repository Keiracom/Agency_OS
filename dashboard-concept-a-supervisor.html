<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgencyOS — Concept A · The Supervisor</title>
<script>
  try { if (localStorage.getItem('agencyos_theme') === 'dark') document.documentElement.classList.add('dark'); } catch (e) {}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
}

/* ---------- design tokens ---------- */
:root {
  --cream: #F7F3EE;
  --surface: #EDE8E0;
  --ink: #0C0A08;
  --ink-2: #2E2B26;
  --ink-3: #7A756D;
  --amber: #D4956A;
  --amber-soft: rgba(212,149,106,0.12);
  --amber-glow: rgba(212,149,106,0.08);
  --copper: #C46A3E;
  --green: #6B8E5A;
  --red: #B55A4C;
  --rule: rgba(12,10,8,0.08);
  --brand-sidebar: #0C0A08;
  --on-amber: #1a1207;
  --sidebar-w: 232px;
  --topbar-h: 56px;
}
html.dark {
  --cream: #0C0A08;
  --surface: #16130F;
  --ink: #F5F2EC;
  --ink-2: #C9C3B8;
  --ink-3: #807A6E;
  --rule: rgba(255,255,255,0.08);
  --copper: #E6A87D;
  --amber-soft: rgba(212,149,106,0.16);
}
html.dark #sidebar { background: #000; }
html.dark .card, html.dark .meeting-card, html.dark .prospect-row, html.dark .summary-card, html.dark .qc-card, html.dark .attention-item { background: var(--surface); border-color: var(--rule); }
html.dark .btn-outline { border-color: rgba(255,255,255,0.14); color: var(--ink-2); }
html.dark .btn-outline:hover { border-color: var(--amber); color: var(--amber); }
html.dark .kill-btn { background: #1F1B16; color: var(--ink-2); border-color: var(--rule); }
html.dark .chip { background: #1F1B16; border-color: var(--rule); color: var(--ink-2); }

/* ---------- reset + base ---------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--cream); color: var(--ink); overflow-x: hidden; }
body { font-family: 'DM Sans', system-ui, sans-serif; font-size: 14px; line-height: 1.5; display: flex; max-width: 100vw; }
img, svg { max-width: 100%; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; border: 0; background: none; color: inherit; }
input, select, textarea { font-family: inherit; }
ul { list-style: none; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }
.mono { font-family: 'JetBrains Mono', monospace; }
.eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); }

/* ---------- sidebar ---------- */
#sidebar {
  width: var(--sidebar-w); min-width: var(--sidebar-w); height: 100vh;
  background: var(--brand-sidebar);
  color: #fff;
  display: flex; flex-direction: column;
  position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; overflow-y: auto;
  transition: transform .25s;
}
.sidebar-logo { padding: 22px 20px 18px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.sidebar-logo .logo-text { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 20px; letter-spacing: -0.02em; }
.sidebar-logo .logo-text em { color: var(--amber); font-style: italic; }
.sidebar-logo .logo-sub { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.32); margin-top: 3px; }
.sidebar-section { padding: 16px 0 4px; }
.sidebar-section-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.3); padding: 0 20px 8px; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 9px 20px; font-size: 13px; color: rgba(255,255,255,0.72); cursor: pointer; border-left: 2px solid transparent; transition: color .12s, background .12s, border-color .12s; white-space: nowrap; }
.nav-item:hover { color: #fff; background: rgba(255,255,255,0.03); }
.nav-item.active { color: #fff; background: var(--amber-soft); border-left-color: var(--amber); font-weight: 500; }
.nav-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.75; }
.nav-item.active .nav-icon { opacity: 1; color: var(--amber); }
.nav-badge { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; background: var(--amber); color: var(--on-amber); padding: 1px 6px; border-radius: 10px; min-width: 20px; text-align: center; }
.sidebar-footer { margin-top: auto; padding: 18px 20px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; gap: 10px; }
.avatar-circle { width: 30px; height: 30px; border-radius: 50%; background: var(--amber); color: var(--on-amber); display: grid; place-items: center; font-family: 'Playfair Display', serif; font-weight: 700; font-size: 12px; flex-shrink: 0; }
.sidebar-foot-name { font-size: 13px; color: #fff; }
.sidebar-foot-role { font-size: 11px; color: rgba(255,255,255,0.4); font-family: 'JetBrains Mono', monospace; }

/* ---------- app + topbar ---------- */
#app { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; min-height: 100vh; min-width: 0; }
#topbar { height: var(--topbar-h); background: var(--cream); border-bottom: 1px solid var(--rule); display: flex; align-items: center; padding: 0 36px; position: sticky; top: 0; z-index: 50; gap: 16px; }
.breadcrumb { flex: 1; display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink-3); min-width: 0; }
.crumb-current { color: var(--ink-2); font-weight: 500; }
.crumb-sep { color: var(--ink-3); }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.pulse-row { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--ink-3); font-family: 'JetBrains Mono', monospace; }
.pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
.kill-btn { background: var(--ink); color: #fff; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.06em; padding: 6px 14px; border-radius: 6px; }
.kill-btn:hover { background: var(--red); }
.theme-toggle { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--rule); color: var(--ink-2); display: grid; place-items: center; font-size: 12px; transition: border-color .12s, color .12s; }
.theme-toggle:hover { border-color: var(--amber); color: var(--amber); }
.theme-toggle .t-sun { display: inline; }
.theme-toggle .t-moon { display: none; }
html.dark .theme-toggle .t-sun { display: none; }
html.dark .theme-toggle .t-moon { display: inline; }

#mobile-topbar { display: none; position: fixed; top: 0; left: 0; right: 0; height: 52px; background: var(--brand-sidebar); color: #fff; z-index: 120; align-items: center; padding: 0 14px; gap: 12px; }
.hamburger-btn { color: #fff; font-size: 20px; padding: 4px; }
.mobile-logo { font-family: 'Playfair Display', serif; font-size: 17px; }
.mobile-logo em { color: var(--amber); font-style: italic; }
#bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 58px; background: var(--brand-sidebar); border-top: 1px solid rgba(255,255,255,0.08); z-index: 120; align-items: stretch; }
.bottom-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; color: rgba(255,255,255,0.56); font-size: 10.5px; cursor: pointer; transition: color .12s; }
.bottom-nav-item .bn-ico { font-size: 15px; }
.bottom-nav-item.active { color: var(--amber); }
#sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
#sidebar-overlay.show { display: block; }

/* ---------- page + common cards ---------- */
#page { flex: 1; overflow-y: auto; padding: 36px 40px 60px; max-width: 1360px; width: 100%; margin: 0 auto; }
.page-headline { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 34px; color: var(--ink); line-height: 1.2; letter-spacing: -0.02em; margin-bottom: 6px; }
.page-headline em { color: var(--amber); font-style: italic; }
.page-sub { font-size: 13.5px; color: var(--ink-3); margin-bottom: 30px; }
.section-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); margin: 24px 0 12px; }
.card { background: #fff; border: 1px solid var(--rule); border-radius: 10px; padding: 22px 24px; max-width: 100%; min-width: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.card > * { min-width: 0; }
.btn { padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; border: 1px solid transparent; transition: filter .12s; }
.btn-primary { background: var(--ink); color: #fff; }
html.dark .btn-primary { background: var(--amber); color: var(--on-amber); }
.btn-amber { background: var(--amber); color: var(--on-amber); }
.btn-outline { background: transparent; border: 1px solid var(--rule); color: var(--ink-2); }
.btn-outline:hover { border-color: var(--amber); color: var(--copper); }
.btn-ghost { color: var(--ink-3); }
.btn:active { filter: brightness(0.92); }
.pill { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: 12px; display: inline-block; }
.pill.amber { background: var(--amber-soft); color: var(--copper); }
.pill.green { background: rgba(107,142,90,0.14); color: var(--green); }
.pill.red { background: rgba(181,90,76,0.14); color: var(--red); }
.pill.gray { background: rgba(12,10,8,0.06); color: var(--ink-3); }
html.dark .pill.gray { background: rgba(255,255,255,0.08); }

/* ---------- HOME — BDR Report ---------- */
.bdr-hero {
  background: var(--ink); color: #fff;
  border-radius: 12px; padding: 28px 32px; margin-bottom: 28px;
  display: grid; grid-template-columns: auto 1fr; gap: 24px; align-items: center;
}
.bdr-avatar {
  width: 64px; height: 64px; border-radius: 50%;
  background: linear-gradient(135deg, var(--amber), #a87044);
  display: grid; place-items: center;
  font-family: 'Playfair Display', serif; font-weight: 700; font-size: 26px;
  color: var(--on-amber); flex-shrink: 0;
}
.bdr-hero .eyebrow { color: rgba(255,255,255,0.5); margin-bottom: 4px; }
.bdr-hero h2 { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 24px; line-height: 1.3; letter-spacing: -0.01em; }
.bdr-hero h2 em { color: var(--amber); font-style: italic; }
.bdr-hero .hero-sub { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 8px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.bdr-hero .hero-dot { color: rgba(255,255,255,0.3); }

.summary-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 32px; }
.summary-card { background: #fff; border: 1px solid var(--rule); border-radius: 10px; padding: 20px 22px; }
.summary-val { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 700; color: var(--ink); line-height: 1; }
.summary-val em { color: var(--amber); font-style: normal; }
.summary-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-3); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 8px; }
.summary-delta { font-size: 12px; margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
.summary-delta.up { color: var(--green); }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }

.activity-row { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--rule); align-items: flex-start; }
.activity-row:last-child { border-bottom: 0; }
.activity-ico { width: 30px; height: 30px; border-radius: 8px; background: var(--amber-soft); color: var(--copper); display: grid; place-items: center; flex-shrink: 0; font-size: 13px; }
.activity-text { font-size: 13px; color: var(--ink); line-height: 1.55; }
.activity-text b { font-weight: 600; }
.activity-time { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--ink-3); margin-top: 2px; letter-spacing: 0.04em; }

.attention-item { background: var(--amber-soft); border: 1px solid var(--amber); border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; display: flex; gap: 12px; align-items: flex-start; }
.attention-item.meeting { background: rgba(107,142,90,0.08); border-color: var(--green); }
.att-ic { width: 28px; height: 28px; border-radius: 8px; background: var(--amber); color: var(--on-amber); display: grid; place-items: center; flex-shrink: 0; font-size: 14px; }
.attention-item.meeting .att-ic { background: var(--green); color: #fff; }
.att-text { flex: 1; font-size: 13px; color: var(--ink-2); line-height: 1.5; }
.att-text b { color: var(--ink); font-weight: 600; }
.att-cta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--copper); cursor: pointer; white-space: nowrap; }
.attention-item.meeting .att-cta { color: var(--green); }

.qc-row { display: grid; grid-template-columns: auto 1fr auto; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--rule); align-items: center; }
.qc-row:last-child { border-bottom: 0; }
.qc-check { width: 26px; height: 26px; border-radius: 50%; display: grid; place-items: center; color: #fff; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.qc-check.pass { background: var(--green); }
.qc-check.fail { background: var(--red); }
.qc-main { min-width: 0; }
.qc-label { font-size: 12.5px; color: var(--ink); }
.qc-label b { font-weight: 600; }
.qc-note { font-size: 11.5px; color: var(--ink-3); font-style: italic; margin-top: 2px; }
.qc-outcome { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
.qc-outcome.pass { color: var(--green); }
.qc-outcome.fail { color: var(--red); }

/* ---------- PROSPECTS ---------- */
.filter-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 22px; }
.chip { padding: 7px 16px; border-radius: 20px; font-size: 13px; border: 1px solid var(--rule); background: #fff; color: var(--ink-3); cursor: pointer; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em; transition: all .12s; }
.chip.active { background: var(--amber-soft); border-color: var(--amber); color: var(--copper); }
.chip:hover { border-color: var(--amber); color: var(--copper); }

.prospect-row { background: #fff; border: 1px solid var(--rule); border-radius: 10px; margin-bottom: 10px; display: grid; grid-template-columns: 48px 1fr auto auto auto; gap: 16px; align-items: center; padding: 14px 18px; cursor: pointer; transition: border-color .12s, box-shadow .12s; }
.prospect-row:hover { border-color: var(--amber); box-shadow: 0 2px 12px rgba(212,149,106,0.08); }
.vr-grade { width: 40px; height: 40px; border-radius: 10px; display: grid; place-items: center; color: #fff; font-family: 'Playfair Display', serif; font-weight: 700; font-size: 18px; }
.vr-grade[data-g="A"], .vr-grade[data-g="B"] { background: var(--green); }
.vr-grade[data-g="C"] { background: var(--amber); color: var(--on-amber); }
.vr-grade[data-g="D"] { background: var(--copper); }
.vr-grade[data-g="F"] { background: var(--red); }
.p-main { min-width: 0; }
.p-name { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
.p-sub { font-size: 12.5px; color: var(--ink-3); font-family: 'JetBrains Mono', monospace; }
.p-dm { text-align: right; font-size: 12.5px; color: var(--ink-2); min-width: 140px; }
.p-dm-title { font-size: 11px; color: var(--ink-3); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }
.p-score { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 600; color: var(--copper); text-align: center; }
.p-score small { display: block; font-size: 9px; color: var(--ink-3); letter-spacing: 0.1em; text-transform: uppercase; }
.p-status { min-width: 120px; text-align: right; }

/* ---------- MEETINGS ---------- */
.meeting-card { background: #fff; border: 1px solid var(--rule); border-radius: 10px; padding: 20px 22px; margin-bottom: 12px; display: grid; grid-template-columns: 48px 1fr auto auto; gap: 16px; align-items: center; min-width: 0; max-width: 100%; transition: border-color .12s, box-shadow .12s; }
.meeting-card:hover { border-color: var(--amber); box-shadow: 0 2px 12px rgba(212,149,106,0.08); }
.m-when { text-align: right; min-width: 120px; }
.m-when-main { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--ink); font-weight: 500; }
.m-when-sub { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--copper); margin-top: 2px; }
.m-empty { background: var(--surface); border: 1px dashed var(--rule); border-radius: 10px; padding: 30px 20px; text-align: center; color: var(--ink-3); font-style: italic; }

/* ---------- PROGRESS ---------- */
.kpi-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 26px; }
.kpi-cell { background: #fff; border: 1px solid var(--rule); border-radius: 10px; padding: 18px 20px; }
.kpi-val { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: var(--ink); line-height: 1; }
.kpi-val small { font-size: 14px; color: var(--ink-3); }
.kpi-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-3); margin-top: 6px; }
.kpi-bench { font-size: 11px; color: var(--green); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }

.funnel { display: flex; flex-direction: column; gap: 8px; padding: 8px 0; }
.f-row { display: flex; align-items: center; gap: 14px; font-size: 13px; }
.f-label { width: 130px; color: var(--ink-2); font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.04em; flex-shrink: 0; }
.f-bar { flex: 1; height: 26px; background: rgba(12,10,8,0.04); border-radius: 4px; overflow: hidden; }
html.dark .f-bar { background: rgba(255,255,255,0.04); }
.f-fill { height: 100%; background: linear-gradient(90deg, var(--amber), #a87044); display: flex; align-items: center; padding: 0 12px; color: var(--on-amber); font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 12px; }
.f-pct { min-width: 52px; text-align: right; color: var(--copper); font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; }

.roi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.roi-cell { background: var(--surface); border-radius: 10px; padding: 16px 18px; }
html.dark .roi-cell { background: rgba(255,255,255,0.04); }
.roi-val { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--copper); line-height: 1; }
.roi-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--ink-3); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 6px; }
.roi-delta { font-family: 'JetBrains Mono', monospace; font-size: 11px; margin-top: 6px; color: var(--green); }

/* ---------- BRIEFING DRAWER ---------- */
.drawer-backdrop { position: fixed; inset: 0; background: rgba(12,10,8,0.45); z-index: 150; display: none; backdrop-filter: blur(2px); }
.drawer-backdrop.on { display: block; }
.drawer { position: fixed; right: 0; top: 0; bottom: 0; width: min(620px, 100%); background: var(--cream); border-left: 1px solid var(--rule); z-index: 160; transform: translateX(100%); transition: transform .3s cubic-bezier(.2,.7,.3,1); overflow-y: auto; }
.drawer.on { transform: translateX(0); }
.drawer-head { padding: 20px 24px; border-bottom: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; position: sticky; top: 0; background: var(--cream); z-index: 3; }
.drawer-close { font-size: 22px; color: var(--ink-3); padding: 4px 8px; }
.drawer-close:hover { color: var(--copper); }
.drawer-body { padding: 20px 24px 40px; }
.bf-section { margin-bottom: 22px; }
.bf-section h4 { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--rule); }
.bf-ai-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--copper); margin-bottom: 14px; }
.bf-hook { font-family: 'Playfair Display', serif; font-style: italic; font-size: 15px; color: var(--ink-2); line-height: 1.7; padding: 14px 16px; background: var(--surface); border-left: 3px solid var(--amber); border-radius: 0 6px 6px 0; }
html.dark .bf-hook { background: rgba(255,255,255,0.04); }
.bf-list { padding-left: 22px; }
.bf-list li { margin-bottom: 8px; font-size: 13px; color: var(--ink-2); line-height: 1.55; }
.bf-obj { padding: 12px 14px; background: var(--surface); border-radius: 8px; margin-bottom: 10px; }
html.dark .bf-obj { background: rgba(255,255,255,0.04); }
.bf-obj .obj-q { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
.bf-obj .obj-a { font-size: 12.5px; color: var(--ink-2); line-height: 1.55; }

====================================================================== */
function overallVulnGrade(vg) {
  if (!vg) return 'C';
  const map = { A:5, B:4, C:3, D:2, F:1 };
  const inv = { 5:'A', 4:'B', 3:'C', 2:'D', 1:'F' };
  const vals = Object.values(vg).map(l => map[l] || 3);
  return inv[Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)] || 'C';
}
function staffRange(s) {
  const n = parseInt(s, 10);
  if (!n) return '—';
  if (n <= 10) return '1-10';
  if (n <= 50) return '11-50';
  if (n <= 200) return '51-200';
  return '200+';
}
function statusPill(s) {
  const c = s === 'Meeting Booked' ? 'green' : s === 'Replied' ? 'amber' : 'gray';
  return `<span class="pill ${c}">${s}</span>`;
}
function findP(id) { return heroProspects.find(p => p.id === id); }

/* ======================================================================
   Router, navigation, theme
====================================================================== */
function navigate(hash) {
  window.location.hash = hash;
  if (window.matchMedia('(max-width: 768px)').matches) {
    document.getElementById('sidebar').classList.remove('mobile-open');
    document.getElementById('sidebar-overlay').classList.remove('show');
  }
}
function router() {
  const hash = window.location.hash || '#home';
  if (hash === '#home') renderHome();
  else if (hash === '#prospects') renderProspects();
  else if (hash === '#meetings') renderMeetings();
  else if (hash === '#progress') renderProgress();
  else if (hash === '#settings') renderSettings();
  else renderHome();
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.route === hash));
  const labels = { '#home':'Home', '#prospects':'Prospects', '#meetings':'Meetings', '#progress':'Progress', '#settings':'Settings' };
  document.getElementById('breadcrumb').innerHTML = `<span>AgencyOS</span><span class="crumb-sep">›</span><span class="crumb-current">${labels[hash] || 'Home'}</span>`;
  const bnMap = { '#home':0, '#prospects':1, '#meetings':2, '#progress':3 };
  document.querySelectorAll('.bottom-nav-item').forEach((el, i) => el.classList.toggle('active', bnMap[hash] === i));
  window.scrollTo(0, 0);
  closeBriefing();
}
window.addEventListener('hashchange', router);

function toggleMobileSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  sb.classList.toggle('mobile-open');
  ov.classList.toggle('show');
}

/* theme */
const THEME_KEY = 'agencyos_theme';
document.addEventListener('click', e => {
  if (e.target.closest('.theme-toggle')) {
    const next = document.documentElement.classList.contains('dark') ? 'light' : 'dark';
    document.documentElement.classList.toggle('dark', next === 'dark');
    localStorage.setItem(THEME_KEY, next);
  }
});

/* boot */
router();
