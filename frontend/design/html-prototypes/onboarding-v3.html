<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Started | Agency OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0A0A12;
            --bg-secondary: #12121A;
            --bg-tertiary: #1A1A24;
            --border-color: #2A2A3A;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0B0;
            --text-muted: #6B6B7B;
            --accent-purple: #7C3AED;
            --accent-purple-light: #9D5CFF;
            --accent-green: #10B981;
            --accent-blue: #3B82F6;
            --accent-orange: #F59E0B;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .onboarding-container {
            width: 100%;
            max-width: 480px;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .logo p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .onboarding-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
        }

        .card-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .card-header h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .card-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 28px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .divider span {
            padding: 0 16px;
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .connections-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 28px;
        }

        .connection-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .connection-btn:hover {
            border-color: var(--accent-purple);
            background: rgba(124, 58, 237, 0.05);
        }

        .connection-btn.connected {
            border-color: var(--accent-green);
            background: rgba(16, 185, 129, 0.05);
        }

        .connection-btn svg {
            width: 32px;
            height: 32px;
        }

        .connection-btn .label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .connection-btn .status {
            font-size: 11px;
            color: var(--text-muted);
        }

        .connection-btn.connected .status {
            color: var(--accent-green);
        }

        .submit-btn {
            width: 100%;
            padding: 16px 24px;
            background: linear-gradient(135deg, var(--accent-purple) 0%, var(--accent-purple-light) 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.35);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .helper-text {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .helper-text a {
            color: var(--accent-purple);
            text-decoration: none;
        }

        .auto-provision {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 10px;
            margin-bottom: 24px;
        }

        .auto-provision svg {
            width: 18px;
            height: 18px;
            color: var(--accent-green);
            flex-shrink: 0;
        }

        .auto-provision span {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .auto-provision strong {
            color: var(--accent-green);
        }

        /* Tier badge */
        .tier-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.15) 0%, rgba(157, 92, 255, 0.15) 100%);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-purple-light);
            margin-bottom: 24px;
        }

        .tier-badge svg {
            width: 14px;
            height: 14px;
        }
    </style>
</head>
<body>
    <div class="onboarding-container">
        <div class="logo">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="48" height="48" rx="12" fill="url(#logo-gradient)"/>
                <path d="M14 24L20 30L34 16" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                <defs>
                    <linearGradient id="logo-gradient" x1="0" y1="0" x2="48" y2="48">
                        <stop stop-color="#7C3AED"/>
                        <stop offset="1" stop-color="#9D5CFF"/>
                    </linearGradient>
                </defs>
            </svg>
            <h1>Agency OS</h1>
            <p>Your digital employee is ready to work</p>
        </div>

        <div class="onboarding-card">
            <div class="card-header">
                <div class="tier-badge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                    </svg>
                    Ignition Plan
                </div>
                <h2>Let's get you set up</h2>
                <p>Just 3 things and Maya will take it from here</p>
            </div>

            <!-- Website URL -->
            <div class="form-group">
                <label>Your Agency Website</label>
                <input type="url" id="website-url" placeholder="https://youragency.com.au" autofocus>
            </div>

            <!-- Auto-provision notice -->
            <div class="auto-provision">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                    <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                <span><strong>Email & Phone</strong> auto-provisioned from pre-warmed pool</span>
            </div>

            <div class="divider">
                <span>Connect Your Tools</span>
            </div>

            <!-- Connection Buttons -->
            <div class="connections-grid">
                <button class="connection-btn" id="crm-btn" onclick="toggleConnection('crm')">
                    <svg viewBox="0 0 32 32" fill="none">
                        <rect width="32" height="32" rx="6" fill="#FF7A59"/>
                        <path d="M16 8v16M8 16h16" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                    </svg>
                    <span class="label">HubSpot CRM</span>
                    <span class="status">Click to connect</span>
                </button>

                <button class="connection-btn" id="linkedin-btn" onclick="toggleConnection('linkedin')">
                    <svg viewBox="0 0 32 32" fill="none">
                        <rect width="32" height="32" rx="6" fill="#0A66C2"/>
                        <path d="M10 13v9M10 10v.01M14 22v-5c0-2 1-3 3-3s3 1 3 3v5M14 13v9" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    <span class="label">LinkedIn</span>
                    <span class="status">Click to connect</span>
                </button>
            </div>

            <!-- Submit -->
            <button class="submit-btn" id="submit-btn" onclick="startOnboarding()">
                Launch Dashboard →
            </button>

            <p class="helper-text">
                Need help? <a href="#">Contact support</a>
            </p>
        </div>
    </div>

    <script>
        const connections = {
            crm: false,
            linkedin: false
        };

        function toggleConnection(type) {
            // In real app, this would trigger OAuth flow
            connections[type] = !connections[type];
            const btn = document.getElementById(`${type}-btn`);
            const status = btn.querySelector('.status');
            
            if (connections[type]) {
                btn.classList.add('connected');
                status.textContent = 'Connected ✓';
            } else {
                btn.classList.remove('connected');
                status.textContent = 'Click to connect';
            }
        }

        function startOnboarding() {
            const url = document.getElementById('website-url').value;
            
            if (!url) {
                alert('Please enter your website URL');
                return;
            }

            // In real app, this would:
            // 1. POST to /api/v1/onboarding/analyze with URL
            // 2. Redirect to dashboard with extraction job ID
            // 3. Dashboard shows Maya walkthrough + extraction progress
            
            window.location.href = 'dashboard-v3.html?onboarding=true';
        }
    </script>
</body>
</html>
