# Prefect deployment configuration
name: elliot-learning

deployments:
  - name: daily-learning-scrape
    entrypoint: flows/learning_scrape.py:daily_learning_scrape
    work_pool:
      name: local-pool
      job_variables:
        working_dir: /home/elliotbot/clawd/infrastructure/prefect_flows
        env:
          SUPABASE_URL: "{{ $SUPABASE_URL }}"
          SUPABASE_SERVICE_KEY: "{{ $SUPABASE_SERVICE_KEY }}"
          APIFY_API_KEY: "{{ $APIFY_API_KEY }}"
    schedules:
      # Daily at 7am AEST = 21:00 UTC (previous day)
      # AEST = UTC+11 during daylight saving, UTC+10 otherwise
      # Using 21:00 UTC for winter (7am AEST) / 20:00 UTC for summer (7am AEDT)
      - cron: "0 21 * * *"
        timezone: "Australia/Sydney"
        active: true
    tags:
      - learning
      - daily
      - knowledge-pipeline
    description: |
      Daily scrape of multiple sources for knowledge base:
      - HackerNews (top + Show HN + Ask HN)
      - ProductHunt (today's launches with descriptions)
      - GitHub Trending (Python, TypeScript, Collections)
      - YouTube (target channels + AI/SaaS topics)
      - Reddit (r/SaaS, r/Entrepreneur, r/sales, r/startups, etc.)
      
      Schedule: Daily at 7am AEST
    parameters:
      hn_limit: 50
      ph_limit: 10
      gh_limit: 15
      yt_limit: 30
      reddit_limit: 50
