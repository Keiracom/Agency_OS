# FILE: prefect.yaml
# PURPOSE: Prefect deployment configuration for Agency OS
# PHASE: 5 (Orchestration)
# TASK: ORC-011
# DEPENDENCIES:
#   - Dockerfile.prefect
#   - src/orchestration/flows/*.py
# RULES APPLIED:
#   - Rule 1: Follow blueprint exactly
#   - Rule 20: Webhook-first architecture - cron jobs are safety nets
#   - Prefect 3.x deployment patterns

# ============================================
# PAUSE GOVERNANCE POLICY (GOV-12: Gates As Code)
# ============================================
# Scheduled flows (cron-based) are PAUSED by default for safety.
# Rationale: Webhook-first architecture means on-demand triggers are primary.
# Scheduled flows (cron) act as safety nets only and remain paused until
# explicitly unpaused for a specific directive.
#
# Paused categories and unpause criteria:
#
# 1. SAFETY NETS (scheduled, paused):
#    - enrichment-flow: Daily 2 AM catch-all. Unpause when: dedicated test window established.
#    - outreach-flow: Hourly 8-6 PM business hours. Unpause when: campaign approval framework live.
#    - reply-recovery-flow: 6-hourly recovery. Unpause when: reply tracking table populated.
#    - pattern-learning-flow: Weekly 3 AM Sunday. Unpause when: CIS learning model ready.
#    - pool-daily-allocation-flow: Daily 6 AM allocation. Unpause when: quota loop tested at scale.
#
# 2. PENDING EXTERNAL DEPS (webhook, paused):
#    - voice-outreach-flow: Paused — Vapi/Telnyx integration not deployed.
#                          Unpause when: voice provider configured + TCP Code compliance verified.
#    - warmup-monitor-flow: Paused — WarmForge domain provisioning not funded.
#                          Unpause when: Salesforge subscription active + budget approved.
#    - persona-buffer-flow: Paused — depends on warmup-monitor.
#                          Unpause when: domain pool seeded (warmup-monitor running).
#
# 3. ACTIVE (not paused):
#    - Webhook-triggered flows: campaign-flow, onboarding-flow, pool-population-flow,
#      pool-assignment-flow, intelligence-flow, pattern backfill flows.
#    - Critical flows: credit-reset-flow (hourly billing integrity), health-check-flow (5-min probe).
#    - Post-event flows: campaign-evolution-flow, monthly-replenishment-flow (triggered by events).
#
# To unpause a flow: update paused: false + set schedule active: true, then document
# the unpause in the directive that triggered it (e.g., Directive #NNN unpause).

# Prefect project configuration
name: agency-os
prefect-version: 3.0.0

# Build/push steps removed - Railway handles container building
# Worker container is built via Dockerfile.worker

# Pull configuration for workers (set working directory)
pull:
  - prefect.deployments.steps.set_working_directory:
      directory: /app

# Deployment definitions
# NOTE: Scheduled flows PAUSED, webhook flows ACTIVE for on-demand/testing
deployments:
  # ============================================
  # CAMPAIGN FLOWS
  # ============================================

  # Campaign activation flow (webhook-triggered)
  - name: campaign-flow
    version: 1.0.0
    paused: false  # Webhook - active for on-demand triggers
    tags: [campaign, activation, webhook-triggered]
    description: "Campaign activation and validation flow (webhook-triggered)"
    entrypoint: src/orchestration/flows/campaign_flow.py:campaign_activation_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules: []

  # ============================================
  # ENRICHMENT FLOWS
  # ============================================

  # Daily enrichment flow (safety net)
  - name: enrichment-flow
    version: 1.0.0
    paused: true
    tags: [enrichment, daily, safety-net]
    description: "Daily enrichment safety net at 2 AM AEST"
    entrypoint: src/orchestration/flows/enrichment_flow.py:daily_enrichment_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    parameters:
      batch_size: 100
    schedules:
      - cron: "0 2 * * *"
        timezone: Australia/Sydney
        active: false

  # ============================================
  # OUTREACH FLOWS
  # ============================================

  # Hourly outreach flow (business hours safety net)
  - name: outreach-flow
    version: 1.0.0
    paused: true
    tags: [outreach, hourly, business-hours, safety-net]
    description: "Hourly outreach during business hours (8 AM-6 PM AEST, Mon-Fri)"
    entrypoint: src/orchestration/flows/outreach_flow.py:hourly_outreach_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    parameters:
      batch_size: 50
    schedules:
      - cron: "0 8-18 * * 1-5"
        timezone: Australia/Sydney
        active: false

  # Voice outreach flow (TCP Code compliant calling hours)
  - name: voice-outreach-flow
    version: 1.0.0
    paused: true  # PAUSED - enable only when Twilio active
    tags: [voice, outreach, compliance, tcp-code]
    description: "Voice outreach with TCP Code compliance (Mon-Fri 9am-8pm, Sat 9am-5pm AEST)"
    entrypoint: src/orchestration/flows/voice_flow.py:voice_outreach_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    concurrency_limit: 1  # Prevent overlapping runs
    schedules:
      - cron: "*/30 9-20 * * 1-6"
        timezone: Australia/Sydney
        active: false  # Inactive until Twilio configured

  # Reply recovery flow (6-hourly safety net)
  - name: reply-recovery-flow
    version: 1.0.0
    paused: true
    tags: [replies, recovery, safety-net]
    description: "Reply recovery safety net every 6 hours"
    entrypoint: src/orchestration/flows/reply_recovery_flow.py:reply_recovery_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    parameters:
      lookback_hours: 6
    schedules:
      - interval: 21600
        timezone: Australia/Sydney
        active: false

  # ============================================
  # ONBOARDING FLOWS
  # ============================================

  # ICP onboarding flow (webhook-triggered for new clients)
  - name: onboarding-flow
    version: 1.0.0
    paused: false  # Webhook - active for on-demand triggers
    tags: [onboarding, icp, webhook-triggered]
    description: "ICP extraction and onboarding for new clients"
    entrypoint: src/orchestration/flows/onboarding_flow.py:icp_onboarding_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules: []

  # ICP re-extract flow (webhook-triggered)
  - name: icp-reextract-flow
    version: 1.0.0
    paused: false  # Webhook - active for on-demand triggers
    tags: [onboarding, icp, reextract, webhook-triggered]
    description: "Re-extract ICP for existing client"
    entrypoint: src/orchestration/flows/onboarding_flow.py:icp_reextract_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules: []

  # ============================================
  # LEAD POOL FLOWS
  # ============================================

  # Pool population flow (webhook-triggered)
  - name: pool-population-flow
    version: 1.0.0
    paused: false  # Webhook - active for on-demand triggers
    tags: [pool, population, webhook-triggered]
    description: "Populate lead pool with enriched leads"
    entrypoint: src/orchestration/flows/pool_population_flow.py:pool_population_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules: []

  # Pool campaign assignment flow (webhook-triggered)
  - name: pool-assignment-flow
    version: 1.0.0
    paused: false  # Webhook - active for on-demand triggers
    tags: [pool, assignment, webhook-triggered]
    description: "Assign leads from pool to campaign"
    entrypoint: src/orchestration/flows/pool_assignment_flow.py:pool_campaign_assignment_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules: []

  # Pool daily allocation flow (scheduled)
  - name: pool-daily-allocation-flow
    version: 1.0.0
    paused: true
    tags: [pool, allocation, daily, safety-net]
    description: "Daily lead allocation from pools to campaigns at 6 AM AEST"
    entrypoint: src/orchestration/flows/pool_assignment_flow.py:pool_daily_allocation_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules:
      - cron: "0 6 * * *"
        timezone: Australia/Sydney
        active: false

  # ============================================
  # BILLING/CREDIT FLOWS
  # ============================================

  # Credit reset check flow (hourly safety net)
  - name: credit-reset-flow
    version: 1.0.0
    paused: false  # Critical billing flow - active
    tags: [billing, credits, hourly, critical]
    description: "Hourly credit reset check for billing integrity"
    entrypoint: src/orchestration/flows/credit_reset_flow.py:credit_reset_check_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules:
      - cron: "0 * * * *"
        timezone: Australia/Sydney
        active: false

  # Monthly replenishment flow (triggered by credit reset)
  - name: monthly-replenishment-flow
    version: 1.0.0
    paused: false  # Triggered by credit_reset - active
    tags: [leads, monthly, replenishment]
    description: "Post-credit-reset lead replenishment (triggered, not scheduled)"
    entrypoint: src/orchestration/flows/monthly_replenishment_flow.py:monthly_replenishment_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules: []

  # ============================================
  # CAMPAIGN EVOLUTION FLOWS
  # ============================================

  # Campaign evolution flow (triggered after pattern learning)
  - name: campaign-evolution-flow
    version: 1.0.0
    paused: false  # Triggered by pattern_learning - active
    tags: [campaigns, evolution, cis, suggestions]
    description: "CIS-driven campaign optimization suggestions (triggered, not scheduled)"
    entrypoint: src/orchestration/flows/campaign_evolution_flow.py:campaign_evolution_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules: []

  # Batch campaign evolution (all eligible clients)
  - name: batch-campaign-evolution-flow
    version: 1.0.0
    paused: false  # Triggered after weekly pattern learning
    tags: [campaigns, evolution, batch]
    description: "Run campaign evolution for all eligible clients"
    entrypoint: src/orchestration/flows/campaign_evolution_flow.py:batch_campaign_evolution_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules: []

  # ============================================

  # ============================================
  # INTELLIGENCE FLOWS
  # ============================================

  # Intelligence research flow (webhook-triggered)
  - name: intelligence-flow
    version: 1.0.0
    paused: false  # Webhook - active for on-demand triggers
    tags: [intelligence, research, webhook-triggered]
    description: "Deep research on lead for conversion intelligence"
    entrypoint: src/orchestration/flows/intelligence_flow.py:intelligence_research_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules: []

  # Lead research trigger flow (webhook-triggered)
  - name: trigger-lead-research
    version: 1.0.0
    paused: false  # Webhook - active for on-demand triggers
    tags: [intelligence, lead-research, webhook-triggered]
    description: "Trigger research for individual lead"
    entrypoint: src/orchestration/flows/intelligence_flow.py:trigger_lead_research_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules: []

  # ============================================
  # PATTERN LEARNING FLOWS
  # ============================================

  # Weekly pattern learning flow (scheduled)
  - name: pattern-learning-flow
    version: 1.0.0
    paused: true
    tags: [patterns, learning, weekly]
    description: "Weekly pattern learning at 3 AM Sunday AEST"
    entrypoint: src/orchestration/flows/pattern_learning_flow.py:weekly_pattern_learning_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules:
      - cron: "0 3 * * 0"
        timezone: Australia/Sydney
        active: false

  # Single client pattern learning (webhook-triggered)
  - name: client-pattern-learning-flow
    version: 1.0.0
    paused: false  # Webhook - active for on-demand triggers
    tags: [patterns, learning, webhook-triggered]
    description: "Pattern learning for single client"
    entrypoint: src/orchestration/flows/pattern_learning_flow.py:single_client_pattern_learning_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules: []

  # Pattern backfill flow (manual/one-time)
  - name: pattern-backfill-flow
    version: 1.0.0
    paused: false  # Manual - active for on-demand triggers
    tags: [patterns, backfill, manual]
    description: "Backfill historical patterns (manual trigger)"
    entrypoint: src/orchestration/flows/pattern_backfill_flow.py:pattern_backfill_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules: []

  # Single client backfill flow (webhook-triggered)
  - name: client-backfill-flow
    version: 1.0.0
    paused: false  # Webhook - active for on-demand triggers
    tags: [patterns, backfill, webhook-triggered]
    description: "Backfill patterns for single client"
    entrypoint: src/orchestration/flows/pattern_backfill_flow.py:single_client_backfill_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules: []

  # ============================================
  # RESOURCE POOL FLOWS
  # ============================================

  # Warmup monitor flow - checks WarmForge for completed warmups
  - name: warmup-monitor-flow
    version: 1.0.0
    paused: true  # PAUSED - enable when domain provisioning funded
    tags: [resource-pool, warmup, daily]
    description: "Daily check of WarmForge for completed domain warmups (6 AM AEST)"
    entrypoint: src/orchestration/flows/warmup_monitor_flow.py:warmup_monitor_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules:
      - cron: "0 6 * * *"
        timezone: Australia/Sydney
        active: false  # Inactive until funded

  # Persona buffer flow - replenishes persona pool (webhook-triggered by Stripe)
  - name: persona-buffer-flow
    version: 1.0.0
    paused: true  # PAUSED - enable when domain provisioning funded
    tags: [resource-pool, personas, webhook-triggered]
    description: "Replenish persona buffer when below 40% (Stripe webhook trigger)"
    entrypoint: src/orchestration/flows/persona_buffer_flow.py:persona_buffer_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    schedules: []

  # ============================================
  # PIPELINE F MASTER FLOW (P4-BUILD)
  # ============================================

  # Pipeline F v2.1 master flow — automated Stages 1-11
  - name: pipeline-f-master-flow
    version: 1.0.0
    paused: false  # Active for P5 validation
    tags: [p4, pipeline-f, master-flow, stages-1-11]
    description: "Pipeline F v2.1 master flow — automated Stages 1-11 via Prefect. Manual trigger for P5 validation."
    entrypoint: src/orchestration/flows/pipeline_f_master_flow.py:pipeline_f_master_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    parameters:
      categories: ["dental"]
      domains_per_category: 2
      dry_run: false
      budget_cap_aud: 25.0
    schedules: []

  # ============================================
  # MONITORING FLOWS
  # ============================================

  - name: health-check-flow
    version: "1.0.0"
    description: "5-minute health probe — detection always ON, response gated by feature flags"
    tags: [health, monitoring, b4]
    paused: false
    schedule:
      cron: "*/5 * * * *"
      timezone: "Australia/Sydney"
    entrypoint: src/orchestration/flows/health_check_flow.py:health_check_flow

  # ============================================
  # BU CLOSED-LOOP ENGINE (Directive: BU Closed-Loop S2)
  # ============================================
  # Daily backlog driver — re-enters stuck BU rows at their next stage in
  # free-mode (zero AUD spend by default). PAUSED by default. Unpause when:
  # S3 ratifies domain_data reconstruction from BU columns AND live-spend
  # safety review confirms AUD 0 budget enforcement at scale.
  - name: bu-closed-loop-flow
    version: "1.0.0"
    paused: true  # PAUSED — see unpause criteria above
    tags: [bu-closed-loop, backlog-driver, free-mode, safety-net]
    description: "BU Closed-Loop S2 backlog driver — daily 04:00 UTC stuck-row sweep with age-tiered cadence."
    entrypoint: src/orchestration/flows/bu_closed_loop_flow.py:bu_closed_loop_flow
    work_pool:
      name: agency-os-pool
      work_queue_name: agency-os-queue
    parameters:
      max_rows: 500
      free_mode_only: true
      cadence_hot_days: 14
      cadence_warm_days: 60
      cadence_cold_days: 180
    schedules:
      - cron: "0 4 * * *"
        timezone: UTC
        active: false  # Inactive until S3 ratification

# Environment variables reference
# These should be set in Railway/environment, not hardcoded here
# Required environment variables:
# - DATABASE_URL
# - REDIS_URL
# - ANTHROPIC_API_KEY
# - APOLLO_API_KEY
# - APIFY_API_KEY
# - CLAY_API_KEY
# - RESEND_API_KEY
# - TWILIO_ACCOUNT_SID
# - TWILIO_AUTH_TOKEN
# - HEYREACH_API_KEY
# - PREFECT_API_URL

# Worker configuration
# Workers pull from the agency-os-queue and execute flows
# Start worker with: prefect worker start --pool agency-os-pool

