[pytest]
# Configure test collection paths
testpaths = tests

# Ignore directories that should not be collected
addopts = --ignore=docs --ignore=scripts --ignore=screenshot-to-code --ignore=test_icp_extraction.py -m "not live"

# Asyncio mode
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Global per-test timeout (pytest-timeout). 300s with the thread method so a hung
# test — e.g. an async await on a service that's present locally but absent in CI
# — fails fast with a traceback instead of running to the CI job kill (~27min).
# Root cause of the #1276 pytest hang (Agency_OS-28ai): a hang had no timeout to
# catch it. thread method handles async/C-level blocks SIGALRM can't interrupt.
# Per-test override: @pytest.mark.timeout(N) (0 = disable).
timeout = 300
timeout_method = thread

# Custom markers
markers =
    integration: marks tests as integration tests
    live: hits real external services — opt-in via `pytest -m live`
    kei104: opt-in marker for KEI-104 stale-claim tests — bypasses the autouse `_release_stale_claims` noop so the real helper executes
