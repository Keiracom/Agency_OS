# Drop-in: concurrency cap for scout-agent.service (KEI Agency_OS-03w4)
# Installed at: /home/elliotbot/.config/systemd/user/scout-agent.service.d/concurrency.conf
# Installer: scripts/install_concurrency_dropins.sh
#
# StartLimitBurst=0 disables systemd's burst limit so Restart=always +
# RestartSec=10 retries indefinitely until a slot opens. The spawn-gate
# is the cap; systemd retry is the queue.
[Unit]
StartLimitBurst=0

[Service]
ExecStartPre=/home/elliotbot/clawd/Agency_OS/scripts/agent_spawn_gate.py --acquire --callsign scout
ExecStopPost=-/home/elliotbot/clawd/Agency_OS/scripts/agent_spawn_gate.py --release --callsign scout
